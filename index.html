<!DOCTYPE html>
<html lang="en">
<head>

  <title>saw//tell</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">

          <span class="platform-icon" aria-hidden="true">◉</span>

          <span class="platform-icon" aria-hidden="true">▶</span>

        </a>
        <a href="https://music.apple.com/us/artist/sawtell/402361195" class="platform-link platform-apple" target="_blank" rel="noopener noreferrer">
          <span class="platform-icon" aria-hidden="true">♫</span>

    <footer class="footer">
